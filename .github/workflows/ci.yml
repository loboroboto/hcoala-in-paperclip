name: CI

# Offline checks for the Paperclip operationalization scripts (#56/S8 onward):
# byte-compile + pytest. No secrets/network — the company-sync tests run against an
# httpx.MockTransport fake board.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Byte-compile scripts
        run: python -m py_compile scripts/paperclip-company-sync.py scripts/paperclip-onboarder.py
      - name: Run tests
        run: pytest tests/ -v
